<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> GitHub Issues Tracker | Home </title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind + Daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body>
    <header class="sticky top-0 bg-white z-50 ">
        <div class="navbar bg-base-100 shadow-sm  ">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="-1" class="menu menu-sm dropdown-content rounded-box z-1 mt-8 w-52  space-y-3">
                        <input type="text" placeholder="Search issues" class="input input-bordered w-full md:w-auto " />
                        <li><a href="http://" class="btn btn-primary w-full"><i class="fa-solid fa-plus"></i>New
                                Issue</a></li>
                    </ul>
                </div>

                <a href="" class="flex items-center gap-2 normal-case">
                    <img class="w-8" src="./assets/github-logo.png" alt="">
                    <span class="text-lg font-bold">GitHub Issues Tracker</span>
                </a>
            </div>

            <div class="navbar-end hidden lg:flex ">
                <ul class="menu menu-horizontal px-1 space-x-4">
                    <input type="text" placeholder="Search issues" class="input input-bordered w-24 md:w-auto" />
                    <li><a href="http://" class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</a></li>
                </ul>
            </div>
        </div>
    </header>

    <section class="bg-slate-50 pt-2">

        <div class="w-[80%] bg-white shadow-md rounded-sm mx-auto py-6 mb-6 flex justify-center items-center gap-4">
            <button id="all-button" type="button" class="btn ">All</button>
            <button type="button" class="btn">Open</button>
            <button type="button" class="btn">Close</button>
        </div>

        <!-- //! No need to touch this one -->
        <div class="bg-white shadow-md rounded-sm w-[80%] mb-6 mx-auto">
            <div class="flex justify-between items-center   py-3  px-4">
                <div class="left flex gap-1">
                    <img class="relative w-12 h-12 rounded-full bg-violet-100 flex justify-center items-center"
                        src="./assets/Aperture.png" alt="Wheel" class="w-8 h-8 object-contain">
                    <div class="balance-info">
                        <h2 class="text-xl font-bold"><span id="balance">50 Issues</span></h2>
                        <p class=" text-neutral/50">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="right flex items-center gap-2 ">
                    <p class="w-1 h-1 rounded-full border-7 border-green-600"></p>
                    <p>Open</p>
                    <p class="w-1 h-1 rounded-full border-7 border-purple-700"></p>
                    <p>Close</p>
                </div>
            </div>
        </div>

        <!-- //! card  -->
        <div id="status-container"
            class="bg-slate-50 w-[80%]  mx-auto grid grid-rows-1 justify-center md:grid-cols-4 gap-6  justify-items-center ">
        </div>

        <!-- //! Open the modal using ID.showModal() method -->
        <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="details-container" class="space-y-4">
                    <!-- //! dynamic content  -->
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

        


    </section>

    <script src="./script//allData.js"></script>
</body>

</html>
